<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Nhận Diện Vân Tay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap');

        body {
            font-family: 'Roboto Mono', monospace;
            background-color: #0f172a; /* bg-slate-900 */
            color: #e2e8f0; /* text-slate-200 */
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .container {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The fingerprint image wrapper */
        .fingerprint-wrapper {
            position: relative;
            width: 200px;
            height: 250px;
            margin-bottom: 30px;
        }

        /* SVG Fingerprint Base */
        .fingerprint-svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: #334155; /* slate-700 */
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.5s ease;
        }

        /* Active state for fingerprint */
        .fingerprint-svg.active {
            stroke: #3b82f6; /* blue-500 */
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.6));
        }

        .fingerprint-svg.success {
            stroke: #10b981; /* emerald-500 */
            filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.8));
        }

        .fingerprint-svg.error {
            stroke: #ef4444; /* red-500 */
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.8));
        }


        /* The Scanner Line */
        .scanner-line {
            position: absolute;
            top: 0;
            left: -10%;
            width: 120%;
            height: 4px;
            background: #3b82f6;
            box-shadow: 0 0 15px 2px #3b82f6;
            opacity: 0;
            z-index: 10;
        }

        /* Scanning Animation */
        @keyframes scan {
            0% { top: 0; opacity: 1; }
            50% { top: 100%; opacity: 1; }
            100% { top: 0; opacity: 1; }
        }

        .scanning .scanner-line {
            animation: scan 2s linear infinite;
        }

        /* Scanner Glow Area */
        .scanner-glow {
            position: absolute;
            top: 0;
            left: -10%;
            width: 120%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(59, 130, 246, 0) 0%, rgba(59, 130, 246, 0.3) 100%);
            opacity: 0;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scanGlow {
            0% { top: -50px; opacity: 1; }
            50% { top: calc(100% - 50px); opacity: 1; }
            100% { top: -50px; opacity: 1; }
        }

        .scanning .scanner-glow {
            animation: scanGlow 2s linear infinite;
        }


        /* Minutiae Points (Dots) */
        .minutiae-point {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #f59e0b; /* amber-500 */
            box-shadow: 0 0 5px #f59e0b;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
            z-index: 20;
        }

        .extracting .minutiae-point {
            opacity: 1;
            transform: scale(1);
        }

        /* Connection Lines between points */
        svg.connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        .connection-line {
            stroke: #f59e0b;
            stroke-width: 1;
            stroke-dasharray: 4;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .matching .connection-line {
            opacity: 0.6;
        }

        /* Status Text */
        .status-text {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .status-text.blue { color: #3b82f6; }
        .status-text.green { color: #10b981; }
        .status-text.red { color: #ef4444; }
        .status-text.yellow { color: #f59e0b; }

        /* Data Visualization (Binary text overlay) */
        .data-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            z-index: 25;
            display: flex;
            flex-wrap: wrap;
            font-size: 8px;
            color: #10b981;
            line-height: 1;
            word-break: break-all;
            transition: opacity 0.5s ease;
        }

        .matching .data-overlay {
            opacity: 0.3;
        }

        /* Button styling */
        .action-btn {
            background: transparent;
            border: 2px solid #3b82f6;
            color: #3b82f6;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Roboto Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
            outline: none;
        }

        .action-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }
        
        .action-btn:disabled {
            border-color: #475569;
            color: #475569;
            cursor: not-allowed;
            box-shadow: none;
            background: transparent;
        }

        /* Progress Bar */
        .progress-container {
            width: 80%;
            height: 6px;
            background-color: #334155;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #3b82f6;
            transition: width 0.1s linear;
        }

        .progress-container.visible {
            opacity: 1;
        }

        /* Particle effect for success */
        .particle {
            position: absolute;
            background-color: #10b981;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

    </style>
</head>
<body>

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Hệ Thống Sinh Trắc Học</h1>
        <p class="text-slate-400 text-sm">Mô phỏng quá trình nhận diện vân tay</p>
    </div>

    <div class="container" id="simulation-container">
        
        <!-- Fingerprint Area -->
        <div class="fingerprint-wrapper" id="fp-wrapper">
            <!-- SVG paths for a stylized fingerprint -->
            <svg class="fingerprint-svg" id="fp-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer ridges -->
                <path d="M30 15 C45 5, 55 5, 70 15 C85 25, 90 45, 90 65 C90 85, 80 100, 70 110" />
                <path d="M20 25 C40 10, 60 10, 80 25 C95 40, 95 65, 85 85 C80 95, 70 105, 60 115" />
                
                <!-- Core ridges -->
                <path d="M40 25 C50 18, 60 18, 70 25 C80 35, 80 55, 75 75 C70 90, 60 100, 50 105" />
                <path d="M30 35 C45 25, 65 25, 75 40 C85 55, 75 75, 65 90 C55 100, 45 105, 35 105" />
                
                <!-- Inner loops -->
                <path d="M40 40 C50 32, 60 32, 65 45 C70 55, 65 70, 55 80 C45 90, 35 95, 25 95" />
                <path d="M45 50 C55 45, 60 50, 55 60 C50 70, 40 80, 30 85" />
                
                <!-- Center core -->
                <path d="M45 65 C50 60, 50 70, 45 75 C40 80, 35 80, 30 75" />
                <path d="M50 85 C45 90, 40 90, 35 85" />
                
                <!-- Bottom left ridges -->
                <path d="M10 40 C20 50, 25 65, 20 80 C15 90, 10 95, 5 100" />
                <path d="M15 55 C20 65, 20 75, 15 85 C10 90, 5 95, 0 95" />
            </svg>

            <!-- Scanner elements -->
            <div class="scanner-glow" id="scanner-glow"></div>
            <div class="scanner-line" id="scanner-line"></div>

            <!-- Container for generated minutiae points -->
            <div id="minutiae-container"></div>
            
            <!-- SVG for connection lines -->
            <svg class="connections" id="connection-svg"></svg>

            <!-- Binary data overlay -->
            <div class="data-overlay" id="data-overlay"></div>
        </div>

        <!-- Status and Controls -->
        <div class="status-text text-slate-500" id="status-text">Sẵn sàng</div>
        
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="flex gap-4">
            <button class="action-btn" id="start-btn" onclick="startSimulation()">
                <i class="fas fa-fingerprint mr-2"></i>Bắt Đầu Quét
            </button>
            <button class="action-btn hidden" id="reset-btn" onclick="resetSimulation()" style="border-color: #64748b; color: #64748b;">
                <i class="fas fa-redo mr-2"></i>Thử Lại
            </button>
        </div>
    </div>

    <script>
        // DOM Elements
        const fpWrapper = document.getElementById('fp-wrapper');
        const fpSvg = document.getElementById('fp-svg');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const minutiaeContainer = document.getElementById('minutiae-container');
        const connectionSvg = document.getElementById('connection-svg');
        const dataOverlay = document.getElementById('data-overlay');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');

        // Points coordinates (relative to wrapper percentages)
        const pointCoords = [
            {x: 35, y: 25}, {x: 65, y: 20}, {x: 80, y: 40}, 
            {x: 75, y: 65}, {x: 55, y: 55}, {x: 40, y: 45}, 
            {x: 25, y: 60}, {x: 45, y: 80}, {x: 65, y: 90},
            {x: 20, y: 85}, {x: 50, y: 35}, {x: 85, y: 80}
        ];

        let pointsCreated = false;
        let isSimulating = false;

        // Initialize binary overlay
        function initDataOverlay() {
            let binary = "";
            for(let i=0; i<500; i++) {
                binary += Math.round(Math.random()) + " ";
            }
            dataOverlay.innerText = binary;
        }

        // Create minutiae points (features)
        function createMinutiaePoints() {
            if (pointsCreated) return;
            
            minutiaeContainer.innerHTML = '';
            connectionSvg.innerHTML = '';

            pointCoords.forEach((coord, index) => {
                const point = document.createElement('div');
                point.className = 'minutiae-point';
                point.style.left = `${coord.x}%`;
                point.style.top = `${coord.y}%`;
                // Add slight random delay for popping effect
                point.style.transitionDelay = `${Math.random() * 0.5}s`;
                minutiaeContainer.appendChild(point);

                // Create connections between some points to form a graph
                if (index > 0) {
                    // Connect to previous point
                    createConnectionLine(coord, pointCoords[index-1]);
                    // Randomly connect to another point to make it look complex
                    if (Math.random() > 0.5 && index > 2) {
                        const randomPrevIndex = Math.floor(Math.random() * (index - 1));
                        createConnectionLine(coord, pointCoords[randomPrevIndex]);
                    }
                }
            });
            pointsCreated = true;
        }

        // Create SVG lines connecting points
        function createConnectionLine(p1, p2) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', `${p1.x}%`);
            line.setAttribute('y1', `${p1.y}%`);
            line.setAttribute('x2', `${p2.x}%`);
            line.setAttribute('y2', `${p2.y}%`);
            line.setAttribute('class', 'connection-line');
            connectionSvg.appendChild(line);
        }

        // Update progress bar
        function updateProgress(percent) {
            progressBar.style.width = `${percent}%`;
        }

        // Set status text and color
        function setStatus(text, colorClass) {
            statusText.innerText = text;
            statusText.className = `status-text ${colorClass}`;
        }

        // Change button states
        function setButtonsState(startDisabled, showReset) {
            startBtn.disabled = startDisabled;
            if (showReset) {
                startBtn.classList.add('hidden');
                resetBtn.classList.remove('hidden');
            } else {
                startBtn.classList.remove('hidden');
                resetBtn.classList.add('hidden');
            }
        }

        // Clean up classes
        function removeAllStateClasses() {
            fpWrapper.classList.remove('scanning', 'extracting', 'matching');
            fpSvg.classList.remove('active', 'success', 'error');
        }

        // Generate success particles
        function createSuccessParticles() {
            const rect = fpWrapper.getBoundingClientRect();
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random size
                const size = Math.random() * 6 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Start center
                particle.style.left = '50%';
                particle.style.top = '50%';
                
                document.getElementById('simulation-container').appendChild(particle);

                // Animate outwards
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 500 + 500,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => particle.remove();
            }
        }

        // Main Simulation Flow
        async function startSimulation() {
            if (isSimulating) return;
            isSimulating = true;
            
            // Reset UI
            removeAllStateClasses();
            initDataOverlay();
            createMinutiaePoints();
            progressContainer.classList.add('visible');
            updateProgress(0);
            setButtonsState(true, false);

            try {
                // Phase 1: Image Acquisition (Scanning)
                setStatus("Đang thu nhận hình ảnh...", "blue");
                fpSvg.classList.add('active');
                fpWrapper.classList.add('scanning');
                await simulateDelay(2000, 0, 30);

                // Phase 2: Feature Extraction (Minutiae)
                setStatus("Trích xuất đặc trưng...", "yellow");
                fpWrapper.classList.remove('scanning');
                fpWrapper.classList.add('extracting');
                await simulateDelay(1500, 30, 60);

                // Phase 3: Template Generation & Matching
                setStatus("Đang đối chiếu dữ liệu...", "blue");
                fpWrapper.classList.add('matching');
                
                // Simulate data flowing
                const interval = setInterval(() => {
                    dataOverlay.innerText = dataOverlay.innerText.split('').sort(()=>Math.random()-0.5).join('');
                }, 100);

                await simulateDelay(2000, 60, 95);
                clearInterval(interval);

                // Phase 4: Decision (Random success/fail for demo)
                const isSuccess = Math.random() > 0.3; // 70% chance of success
                updateProgress(100);

                if (isSuccess) {
                    setStatus("NHẬN DIỆN THÀNH CÔNG", "green");
                    fpSvg.classList.remove('active');
                    fpSvg.classList.add('success');
                    createSuccessParticles();
                } else {
                    setStatus("KHÔNG KHỚP DỮ LIỆU", "red");
                    fpSvg.classList.remove('active');
                    fpSvg.classList.add('error');
                    // Shake effect on error
                    fpWrapper.animate([
                        { transform: 'translateX(0)' },
                        { transform: 'translateX(-10px)' },
                        { transform: 'translateX(10px)' },
                        { transform: 'translateX(-10px)' },
                        { transform: 'translateX(10px)' },
                        { transform: 'translateX(0)' }
                    ], { duration: 400 });
                }

                setTimeout(() => {
                    progressContainer.classList.remove('visible');
                    setButtonsState(false, true);
                    isSimulating = false;
                }, 1000);

            } catch (error) {
                console.error("Simulation error", error);
                isSimulating = false;
            }
        }

        // Helper to delay and update progress
        function simulateDelay(ms, startPercent, endPercent) {
            return new Promise(resolve => {
                const startTime = Date.now();
                
                function update() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(1, elapsed / ms);
                    
                    const currentPercent = startPercent + (endPercent - startPercent) * progress;
                    updateProgress(currentPercent);

                    if (progress < 1) {
                        requestAnimationFrame(update);
                    } else {
                        resolve();
                    }
                }
                requestAnimationFrame(update);
            });
        }

        // Reset the simulation to start state
        function resetSimulation() {
            if (isSimulating) return;
            removeAllStateClasses();
            setStatus("Sẵn sàng", "");
            updateProgress(0);
            progressContainer.classList.remove('visible');
            pointsCreated = false;
            minutiaeContainer.innerHTML = '';
            connectionSvg.innerHTML = '';
            dataOverlay.innerHTML = '';
            setButtonsState(false, false);
        }

        // Initial setup
        initDataOverlay();
    </script>
</body>
</html>
