# Redis Master Config - RDB only
#
# File này chứa cấu hình runtime của Redis master.
# docker-compose.yml chỉ cần chạy: redis-server /etc/redis/redis.conf

# Lắng nghe tất cả interface trong Docker network.
bind 0.0.0.0

# Tắt protected mode vì đây là môi trường Docker demo và đã bật password.
# Production cần kiểm soát firewall/network chặt hơn.
protected-mode no

# Port Redis trong container.
port 6379

# Password cho client khi kết nối Redis.
# Client phải dùng AUTH redis_password hoặc redis-cli -a redis_password.
requirepass redis_password

# Password dùng khi node này trở thành replica hoặc khi failover trong mô hình mở rộng.
# Với demo master/replica đơn giản, khai báo giống requirepass để thống nhất.
masterauth redis_password

# Thư mục lưu dữ liệu Redis trong container.
# Volume ./data/master sẽ mount vào /data.
dir /data

# Tên file snapshot RDB.
dbfilename dump.rdb

# Bật RDB persistence.
# Cú pháp: save <seconds> <changes>
# Nếu có ít nhất 1 thay đổi trong 900 giây thì Redis tạo snapshot.
save 900 1

# Nếu có ít nhất 10 thay đổi trong 300 giây thì Redis tạo snapshot.
save 300 10

# Nếu có ít nhất 10000 thay đổi trong 60 giây thì Redis tạo snapshot.
save 60 10000

# Nếu background save RDB lỗi, Redis sẽ dừng nhận ghi.
# Mục tiêu: tránh hệ thống tiếp tục ghi khi backup không còn an toàn.
stop-writes-on-bgsave-error yes

# Nén dữ liệu trong file RDB.
# Tiết kiệm disk nhưng tốn thêm CPU khi tạo snapshot.
rdbcompression yes

# Thêm checksum vào cuối file RDB để phát hiện file bị corrupt.
rdbchecksum yes

# Tắt AOF vì bài này chỉ mô phỏng backup bằng RDB.
appendonly no
