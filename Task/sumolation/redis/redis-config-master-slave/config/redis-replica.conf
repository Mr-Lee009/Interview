# Redis Replica Config - replicate from redis-master + RDB only
#
# File này dùng chung cho redis-replica-1 và redis-replica-2.

# Lắng nghe tất cả interface trong Docker network.
bind 0.0.0.0

# Tắt protected mode vì đây là môi trường Docker demo và đã bật password.
protected-mode no

# Port Redis trong container.
port 6379

# Password cho client khi kết nối vào replica.
requirepass redis_password

# Password replica dùng để AUTH với master.
masterauth redis_password

# Chỉ định replica sẽ replicate từ service redis-master port 6379.
# Docker network cho phép dùng hostname redis-master.
replicaof redis-master 6379

# Replica chỉ cho phép đọc, không cho client ghi trực tiếp.
# Ghi dữ liệu phải đi qua master.
replica-read-only yes

# Thư mục lưu dữ liệu Redis trong container.
# Mỗi replica có volume riêng mount vào /data.
dir /data

# Tên file snapshot RDB của replica.
dbfilename dump.rdb

# Bật RDB persistence trên replica.
# Việc này hữu ích khi replica được promote hoặc cần recovery local.
save 900 1
save 300 10
save 60 10000

# Nếu background save RDB lỗi, Redis sẽ dừng nhận ghi.
# Với replica read-only, option này vẫn giữ cấu hình nhất quán với master.
stop-writes-on-bgsave-error yes

# Nén file RDB.
rdbcompression yes

# Thêm checksum vào file RDB.
rdbchecksum yes

# Tắt AOF vì bài này chỉ mô phỏng backup bằng RDB.
appendonly no
