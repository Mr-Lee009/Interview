<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saga Pattern: Choreography (Phi tập trung)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8fafc; color: #1e293b; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0f172a; margin-top: 0; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 15px; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-success { background: #10b981; } .btn-fail { background: #ef4444; }
        
        .network { position: relative; width: 100%; height: 300px; background: #f1f5f9; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .lines line { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 5,5; }
        
        .node { position: absolute; background: white; border: 2px solid; border-radius: 8px; padding: 12px; text-align: center; transform: translate(-50%, -50%); width: 160px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; z-index: 2;}
        .node h4 { margin: 0 0 5px 0; font-size: 14px; }
        .node p { margin: 0; font-size: 11px; color: #64748b; }
        .node.active { transform: translate(-50%, -50%) scale(1.08); }

        #account { top: 150px; left: 20%; border-color: #3b82f6; }
        #broker { top: 150px; left: 50%; border-color: #f59e0b; background: #fff7ed; }
        #ledger { top: 150px; left: 80%; border-color: #10b981; }

        .packet { position: absolute; z-index: 3; padding: 5px 10px; color: white; font-size: 11px; font-weight: bold; border-radius: 12px; transform: translate(-50%, -50%); opacity: 0; transition: top 1s, left 1s; white-space: nowrap; }

        .system-log { background: #0f172a; color: #e2e8f0; padding: 15px; border-radius: 8px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 13px; line-height: 1.5; }
        .log-success { color: #34d399; } .log-error { color: #f87171; } .log-info { color: #38bdf8; }
    </style>
</head>
<body>
<div class="container">
    <h2>Mô phỏng Saga: Choreography (Sự kiện nối tiếp)</h2>
    <div class="controls">
        <button class="btn-success" id="btn-ok" onclick="runSim('ok')">Giao dịch Thành công</button>
        <button class="btn-fail" id="btn-err" onclick="runSim('err')">Giao dịch Lỗi (Bù trừ)</button>
    </div>
    <div class="network">
        <svg class="lines" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:1;">
            <line x1="20%" y1="150" x2="50%" y2="150" />
            <line x1="50%" y1="150" x2="80%" y2="150" />
        </svg>
        <div class="node" id="account"><h4>🏦 Account Service</h4><p>Trừ tiền KH gửi</p></div>
        <div class="node" id="broker"><h4>📨 Message Broker</h4><p>Kafka / RabbitMQ</p></div>
        <div class="node" id="ledger"><h4>🗄️ Ledger Service</h4><p>Cộng tiền KH nhận</p></div>
        <div class="packet" id="packet">Event</div>
    </div>
    <h3>System Log</h3>
    <div class="system-log" id="logContainer"></div>
</div>

<script>
    const delay = ms => new Promise(res => setTimeout(res, ms));
    const nodes = { acc: document.getElementById('account'), brk: document.getElementById('broker'), ldg: document.getElementById('ledger') };
    
    function log(text, type='info') {
        document.getElementById('logContainer').innerHTML += `<div class="log-${type}">[${new Date().toLocaleTimeString()}] ${text}</div>`;
        document.getElementById('logContainer').scrollTop = document.getElementById('logContainer').scrollHeight;
    }

    function flash(nodeKey, color) {
        nodes[nodeKey].style.boxShadow = `0 0 15px ${color}`;
        nodes[nodeKey].classList.add('active');
        setTimeout(() => { nodes[nodeKey].classList.remove('active'); nodes[nodeKey].style.boxShadow = 'none'; }, 1000);
    }

    async function move(startL, endL, text, color) {
        const pkt = document.getElementById('packet');
        pkt.innerText = text; pkt.style.background = color; pkt.style.boxShadow = `0 0 10px ${color}`;
        pkt.style.transition = 'none'; pkt.style.top = '150px'; pkt.style.left = startL; pkt.style.opacity = '1';
        await delay(50);
        pkt.style.transition = 'left 1.2s ease-in-out'; pkt.style.left = endL;
        await delay(1200); pkt.style.opacity = '0';
    }

    async function runSim(type) {
        document.getElementById('btn-ok').disabled = true; document.getElementById('btn-err').disabled = true;
        document.getElementById('logContainer').innerHTML = '';

        log('ACCOUNT: Bắt đầu giao dịch chuyển 500k.', 'info');
        flash('acc', '#3b82f6'); await delay(800);
        
        log('ACCOUNT: Đã trừ 500k thành công. Phát Event [FundsDeducted].', 'success');
        await move('20%', '50%', 'Event: FundsDeducted', '#3b82f6');
        flash('brk', '#f59e0b'); await delay(500);

        log('BROKER: Chuyển Event tới Ledger Service.', 'info');
        await move('50%', '80%', 'Pull: FundsDeducted', '#3b82f6');
        flash('ldg', type === 'ok' ? '#10b981' : '#ef4444'); await delay(800);

        if(type === 'ok') {
            log('LEDGER: Đã cộng 500k thành công. Phát Event [LedgerUpdated].', 'success');
            await move('80%', '50%', 'Event: LedgerUpdated', '#10b981');
            flash('brk', '#f59e0b');
            log('✅ GIAO DỊCH HOÀN TẤT!', 'success');
        } else {
            log('LEDGER: LỖI! Tài khoản nhận bị khóa. Phát Event [LedgerFailed].', 'error');
            await move('80%', '50%', 'Event: LedgerFailed', '#ef4444');
            flash('brk', '#f59e0b'); await delay(500);
            
            log('BROKER: Chuyển Event Lỗi về lại Account Service.', 'info');
            await move('50%', '20%', 'Pull: LedgerFailed', '#ef4444');
            flash('acc', '#ef4444'); await delay(800);
            
            log('ACCOUNT: Bắt đầu GIAO DỊCH BÙ TRỪ (Compensating Transaction).', 'error');
            log('ACCOUNT: Đã cộng hoàn trả 500k cho khách hàng gửi.', 'success');
            log('❌ GIAO DỊCH ĐÃ BỊ ROLLBACK AN TOÀN!', 'error');
        }
        document.getElementById('btn-ok').disabled = false; document.getElementById('btn-err').disabled = false;
    }
</script>
</body>
</html>
