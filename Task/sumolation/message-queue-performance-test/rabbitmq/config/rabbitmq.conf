# User/pass mặc định chỉ dùng cho môi trường benchmark local.
default_user = admin
default_pass = admin123

# Bật management ở port 15672 trong container.
management.tcp.port = 15672

# Cluster discovery tĩnh: 3 node RabbitMQ tự tìm nhau theo hostname trong docker network.
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq-1
cluster_formation.classic_config.nodes.2 = rabbit@rabbitmq-2
cluster_formation.classic_config.nodes.3 = rabbit@rabbitmq-3

# Khi tạo queue mới, cố gắng phân bố leader cân bằng hơn giữa các node.
queue_leader_locator = balanced

# Giới hạn message tối đa. RabbitMQ 4.x default là 16MB, max value là 512MB.
# Ở benchmark này đặt 64MB để có thể test message lớn nhưng vẫn tránh phá máy local.
max_message_size = 67108864

# Giới hạn disk trống tối thiểu trước khi RabbitMQ bật flow control.
disk_free_limit.absolute = 1GB

# Ngưỡng memory trước khi RabbitMQ bật flow control.
vm_memory_high_watermark.relative = 0.6
