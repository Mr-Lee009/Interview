<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Chữ ký số (Kịch bản Lỗi)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 { text-align: center; color: #0f172a; margin-top: 0; }

        .scenario-box {
            background: #eef2ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #c7d2fe;
        }

        select {
            padding: 8px 12px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #94a3b8;
            font-weight: bold;
            color: #1e293b;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 15px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { background: #2563eb; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Đồ thị mạng lưới */
        .network-graph {
            position: relative;
            width: 100%;
            height: 400px;
            background: #f1f5f9;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Các Node */
        .node {
            position: absolute;
            z-index: 2;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            width: 180px;
        }
        
        .node h4 { margin: 0 0 5px 0; font-size: 15px; }
        .node p { margin: 0; font-size: 12px; color: #64748b; }

        .node-details {
            margin-top: 8px;
            font-size: 11px;
            font-family: monospace;
            background: #f8fafc;
            padding: 6px;
            border-radius: 4px;
            text-align: left;
            border: 1px solid #e2e8f0;
            min-height: 40px;
        }

        .node.active { transform: translate(-50%, -50%) scale(1.05); }

        /* Tọa độ Node */
        #node-ca { top: 80px; left: 50%; border-color: #eab308; }
        #node-sender { top: 300px; left: 15%; border-color: #3b82f6; }
        #node-hacker { top: 300px; left: 50%; border-color: #ef4444; background: #fef2f2; }
        #node-receiver { top: 300px; left: 85%; border-color: #10b981; }

        /* Gói tin */
        .packet {
            position: absolute;
            z-index: 3;
            padding: 5px 10px;
            background: #f59e0b;
            color: white;
            font-size: 11px;
            font-weight: bold;
            border-radius: 12px;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: top 1.5s ease-in-out, left 1.5s ease-in-out, opacity 0.3s;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            white-space: nowrap;
        }

        /* Bảng Log */
        .system-log {
            background: #0f172a;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13.5px;
            line-height: 1.6;
        }
        .log-time { color: #64748b; margin-right: 8px; }
        .log-step { color: #fcd34d; font-weight: bold; }
        .log-info { color: #38bdf8; }
        .log-success { color: #34d399; }
        .log-warn { color: #fbbf24; }
        .log-error { color: #f87171; font-weight: bold; }
        .log-sub { padding-left: 20px; color: #cbd5e1; display: block; font-size: 12.5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mô phỏng Hệ thống Chữ ký số</h2>
    
    <div class="scenario-box">
        <label for="scenarioSelect"><b>Chọn Kịch bản mô phỏng:</b></label>
        <select id="scenarioSelect" onchange="resetSim()">
            <option value="valid">Kịch bản 1: Hợp lệ (Bình thường)</option>
            <option value="hacker">Kịch bản 2: Dữ liệu bị Hacker sửa đổi (Mất toàn vẹn)</option>
            <option value="revoked">Kịch bản 3: Chứng thư bị thu hồi (Lộ Private Key)</option>
        </select>
    </div>

    <div class="controls">
        <button id="btn-step1" onclick="runStep1()">1. Tạo Khóa & Ký Số</button>
        <button id="btn-step2" onclick="runStep2()" disabled>2. Gửi Tài Liệu</button>
        <button id="btn-step3" onclick="runStep3()" disabled>3. Xác Minh (Verify)</button>
        <button id="btn-reset" onclick="resetSim()" style="background:#64748b;">Khôi phục</button>
    </div>

    <div class="network-graph">
        <svg class="lines">
            <line x1="15%" y1="300" x2="50%" y2="80" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5" />
            <line x1="15%" y1="300" x2="50%" y2="300" stroke="#cbd5e1" stroke-width="2" />
            <line x1="50%" y1="300" x2="85%" y2="300" stroke="#cbd5e1" stroke-width="2" />
            <line x1="85%" y1="300" x2="50%" y2="80" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5" />
        </svg>

        <div class="node" id="node-ca">
            <h4>🏢 Trung tâm CA</h4>
            <div class="node-details" id="detail-ca">Trạng thái: Sẵn sàng<br>Dịch vụ: OCSP / CRL</div>
        </div>

        <div class="node" id="node-sender">
            <h4>👤 Người Ký</h4>
            <div class="node-details" id="detail-sender">Trạng thái: Chờ...<br>File: HoaDon_1Tr.pdf</div>
        </div>

        <div class="node" id="node-hacker" style="opacity: 0.4;">
            <h4>🕵️ Kẻ Tấn Công</h4>
            <div class="node-details" id="detail-hacker">Bắt gói tin (MITM)</div>
        </div>

        <div class="node" id="node-receiver">
            <h4>🏢 Bên Nhận</h4>
            <div class="node-details" id="detail-receiver">Trạng thái: Chờ dữ liệu</div>
        </div>

        <div class="packet" id="packet">Payload</div>
    </div>

    <h3>Nhật ký hệ thống</h3>
    <div class="system-log" id="logContainer"></div>
</div>

<script>
    const logContainer = document.getElementById('logContainer');
    const nodes = {
        ca: document.getElementById('node-ca'),
        sender: document.getElementById('node-sender'),
        hacker: document.getElementById('node-hacker'),
        receiver: document.getElementById('node-receiver')
    };
    const details = {
        ca: document.getElementById('detail-ca'),
        sender: document.getElementById('detail-sender'),
        hacker: document.getElementById('detail-hacker'),
        receiver: document.getElementById('detail-receiver')
    };
    const packet = document.getElementById('packet');

    const delay = ms => new Promise(res => setTimeout(res, ms));

    function getScenario() {
        return document.getElementById('scenarioSelect').value;
    }

    function addLog(step, text, type = 'info', subItems = []) {
        const time = new Date().toLocaleTimeString();
        const p = document.createElement('div');
        let typeClass = 'log-info';
        if(type === 'success') typeClass = 'log-success';
        if(type === 'warn') typeClass = 'log-warn';
        if(type === 'error') typeClass = 'log-error';
        
        let html = `<span class="log-time">[${time}]</span> <span class="log-step">[${step}]</span> <span class="${typeClass}">${text}</span>`;
        subItems.forEach(item => html += `<span class="log-sub">↳ ${item}</span>`);
        p.innerHTML = html;
        logContainer.appendChild(p);
        logContainer.scrollTop = logContainer.scrollHeight;
    }

    function highlightNode(nodeKey, color) {
        nodes[nodeKey].style.borderColor = color;
        nodes[nodeKey].style.boxShadow = `0 0 15px ${color}`;
        nodes[nodeKey].classList.add('active');
        if (nodeKey === 'hacker') nodes[nodeKey].style.opacity = '1';
        
        setTimeout(() => {
            nodes[nodeKey].classList.remove('active');
            nodes[nodeKey].style.boxShadow = 'none';
        }, 1500);
    }

    function movePacket(startTop, startLeft, endTop, endLeft, text, color = '#f59e0b') {
        return new Promise(async (resolve) => {
            packet.innerText = text;
            packet.style.background = color;
            packet.style.boxShadow = `0 0 10px ${color}`;
            packet.style.transition = 'none';
            packet.style.top = startTop; packet.style.left = startLeft;
            packet.style.opacity = '1';
            
            await delay(50);
            
            packet.style.transition = 'top 1.5s ease-in-out, left 1.5s ease-in-out';
            packet.style.top = endTop; packet.style.left = endLeft;
            
            await delay(1500);
            packet.style.opacity = '0';
            resolve();
        });
    }

    // --- BƯỚC 1: TẠO KHÓA & KÝ SỐ ---
    async function runStep1() {
        document.getElementById('btn-step1').disabled = true;
        const scenario = getScenario();
        
        highlightNode('sender', '#3b82f6');
        addLog('BƯỚC 1', 'Đã cấp Chứng thư số. Bắt đầu ký Hash tài liệu HoaDon_1Tr.pdf.', 'info');
        
        await delay(1500);
        details.sender.innerHTML = '🔑 Private Key<br>📜 Chứng thư số<br>✍️ Chữ ký (Hash: 8A2F...)';
        
        if (scenario === 'revoked') {
            addLog('CẢNH BÁO CA', 'Người dùng báo mất USB Token. CA tiến hành Đưa chứng thư vào danh sách thu hồi (CRL)!', 'error');
            highlightNode('ca', '#ef4444');
            details.ca.innerHTML = 'Trạng thái: Sẵn sàng<br>Dịch vụ: OCSP / CRL<br><span style="color:red">Chứng thư User bị THU HỒI</span>';
        } else {
            addLog('HOÀN TẤT', 'Ký số thành công.', 'success');
        }
        
        document.getElementById('btn-step2').disabled = false;
    }

    // --- BƯỚC 2: GỬI TÀI LIỆU ---
    async function runStep2() {
        document.getElementById('btn-step2').disabled = true;
        const scenario = getScenario();
        
        addLog('BƯỚC 2', 'Bắt đầu gửi gói tin qua mạng (Tài liệu + Chữ ký + Chứng thư).', 'info');
        
        if (scenario === 'hacker') {
            // Hacker can thiệp
            nodes['hacker'].style.opacity = '1';
            await movePacket('300px', '15%', '300px', '50%', 'Gói tin gốc', '#8b5cf6');
            
            highlightNode('hacker', '#ef4444');
            addLog('BỊ TẤN CÔNG', 'Hacker chặn gói tin ở giữa (MITM). Sửa hóa đơn thành HoaDon_100Tr.pdf!', 'error');
            details.hacker.innerHTML = 'Sửa nội dung file.<br>Chữ ký giữ nguyên (do không có Private Key).';
            await delay(2000);
            
            await movePacket('300px', '50%', '300px', '85%', 'File Bị Sửa + Chữ Ký Gốc', '#ef4444');
            details.receiver.innerHTML = '📥 Đã nhận:<br>- HoaDon_100Tr.pdf<br>- Chữ ký gốc<br>- Chứng thư số';
        } else {
            // Gửi bình thường
            await movePacket('300px', '15%', '300px', '85%', 'Tài liệu + Chữ Ký + Chứng Thư', '#8b5cf6');
            details.receiver.innerHTML = '📥 Đã nhận:<br>- HoaDon_1Tr.pdf<br>- Chữ ký gốc<br>- Chứng thư số';
        }
        
        highlightNode('receiver', '#10b981');
        document.getElementById('btn-step3').disabled = false;
    }

    // --- BƯỚC 3: XÁC MINH ---
    async function runStep3() {
        document.getElementById('btn-step3').disabled = true;
        const scenario = getScenario();
        
        highlightNode('receiver', '#10b981');
        addLog('BƯỚC 3', 'Bên nhận kiểm tra TOÀN VẸN (Băm lại tài liệu & Giải mã chữ ký).', 'info');
        
        await delay(2000);
        
        if (scenario === 'hacker') {
            addLog('LỖI XÁC MINH', 'Mã Hash không khớp! (Tài liệu đã bị sửa đổi).', 'error', [
                'Hash từ Chữ ký: 8A2F...',
                'Hash tính lại từ file nhận: 9C5B...'
            ]);
            highlightNode('receiver', '#ef4444');
            details.receiver.innerHTML = '❌ XÁC MINH THẤT BẠI<br>Lý do: Sai mã Hash<br>(Toàn vẹn bị phá vỡ)';
            return; // Dừng tiến trình
        }
        
        addLog('BƯỚC 3.1', 'Mã Hash khớp (Toàn vẹn OK). Gọi CA để kiểm tra trạng thái Chứng thư (OCSP).', 'info');
        
        await movePacket('300px', '85%', '80px', '50%', 'Request OCSP', '#64748b');
        highlightNode('ca', '#eab308');
        await delay(1000);
        
        if (scenario === 'revoked') {
            await movePacket('80px', '50%', '300px', '85%', 'Phản hồi: REVOKED', '#ef4444');
            addLog('TỪ CHỐI', 'CA phản hồi: Chứng thư số đã bị THU HỒI. Chữ ký không có giá trị pháp lý.', 'error');
            highlightNode('receiver', '#ef4444');
            details.receiver.innerHTML = '❌ XÁC MINH THẤT BẠI<br>Lý do: Chứng thư bị thu hồi<br>(Lỗi Authenticity)';
        } else {
            await movePacket('80px', '50%', '300px', '85%', 'Phản hồi: GOOD', '#10b981');
            addLog('THÀNH CÔNG', 'CA phản hồi hợp lệ. Chữ ký số hoàn toàn chính xác.', 'success');
            highlightNode('receiver', '#10b981');
            details.receiver.innerHTML = '✅ XÁC MINH THÀNH CÔNG<br>Tài liệu hợp lệ 100%';
        }
    }

    function resetSim() {
        document.getElementById('btn-step1').disabled = false;
        document.getElementById('btn-step2').disabled = true;
        document.getElementById('btn-step3').disabled = true;
        
        logContainer.innerHTML = '';
        nodes['hacker'].style.opacity = '0.4';
        
        details.ca.innerHTML = 'Trạng thái: Sẵn sàng<br>Dịch vụ: OCSP / CRL';
        details.sender.innerHTML = 'Trạng thái: Chờ...<br>File: HoaDon_1Tr.pdf';
        details.hacker.innerHTML = 'Bắt gói tin (MITM)';
        details.receiver.innerHTML = 'Trạng thái: Chờ dữ liệu';
        
        nodes['ca'].style.borderColor = '#eab308';
        nodes['sender'].style.borderColor = '#3b82f6';
        nodes['receiver'].style.borderColor = '#10b981';
        
        addLog('HỆ THỐNG', `Đã chuyển sang: ${document.getElementById('scenarioSelect').options[document.getElementById('scenarioSelect').selectedIndex].text}`, 'warn');
    }
</script>

</body>
</html>
